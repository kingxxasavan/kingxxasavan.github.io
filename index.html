<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>StudyAI</title></head>
<body style="margin:0;background:#111110;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif">

<!-- PASSWORD GATE -->
<div id="gate" style="position:fixed;inset:0;background:#111110;display:flex;align-items:center;justify-content:center;z-index:9999">
  <div style="background:#1c1c1a;border:.5px solid rgba(255,255,255,.09);border-radius:16px;padding:32px 28px;width:320px;text-align:center">
    <div style="font-size:22px;font-weight:600;color:#f0efe8;margin-bottom:4px">Study<span style="color:#D85A30">AI</span></div>
    <div style="font-size:12px;color:#545350;margin-bottom:24px">Enter your access code to continue</div>
    <input id="pw-in" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')checkPW()"
      style="width:100%;background:#252523;border:.5px solid rgba(255,255,255,.09);border-radius:10px;padding:10px 14px;font-size:13px;color:#f0efe8;font-family:inherit;outline:none;box-sizing:border-box;margin-bottom:10px;transition:border-color .15s"
      onfocus="this.style.borderColor='#D85A30'" onblur="this.style.borderColor='rgba(255,255,255,.09)'"/>
    <div id="pw-err" style="font-size:11px;color:#ef4444;height:16px;margin-bottom:8px"></div>
    <button onclick="checkPW()"
      style="width:100%;background:#D85A30;color:#fff;border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .1s"
      onmouseover="this.style.background='#c04e28'" onmouseout="this.style.background='#D85A30'">
      Unlock →
    </button>
  </div>
</div>

<!-- MAIN APP (hidden until auth) -->
<div id="main-app" style="display:none;width:100%;height:100vh;box-sizing:border-box">

<script>
// ── SET YOUR PASSWORD HERE ──────────────────────────────
const SITE_PASSWORD = 'studyai2025';
// ───────────────────────────────────────────────────────

function checkPW(){
  const val = document.getElementById('pw-in').value;
  const err = document.getElementById('pw-err');
  if(val === SITE_PASSWORD){
    sessionStorage.setItem('sa_auth','1');
    document.getElementById('gate').style.display='none';
    document.getElementById('main-app').style.display='block';
  } else {
    err.textContent = 'Incorrect password. Try again.';
    document.getElementById('pw-in').value='';
    document.getElementById('pw-in').focus();
    setTimeout(()=>err.textContent='',2500);
  }
}

// Auto-unlock if already authenticated this session
if(sessionStorage.getItem('sa_auth')==='1'){
  document.getElementById('gate').style.display='none';
  document.getElementById('main-app').style.display='block';
} else {
  setTimeout(()=>document.getElementById('pw-in').focus(),100);
}
</script>

<style>

  if(m.type==='photo'){return`<div style="align-self:${isMe?'flex-end':'flex-start'}"><div class="chat-bubble ${isMe?'me':'them'}" style="padding:5px"><div style="background:var(--bs);border-radius:6px;padding:10px 14px;text-align:center;font-size:10.5px;color:var(--ts)"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="display:block;margin:0 auto 4px"><rect x="1" y="2" width="14" height="11" rx="2" stroke="currentColor" stroke-width="1.3"/><circle cx="5" cy="6" r="1.5" fill="currentColor"/><path d="M1 11l4-4 3 3 2-2 5 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>${e(m.fileName)}</div></div><div style="font-size:9.5px;color:var(--tt);margin-top:2px;text-align:${isMe?'right':'left'}">${m.time}</div></div>`;}

  return`<div style="align-self:${isMe?'flex-end':'flex-start'}"><div class="chat-bubble ${isMe?'me':'them'}">${e(m.content)}</div><div style="font-size:9.5px;color:var(--tt);margin-top:2px;text-align:${isMe?'right':'left'}">${m.time}</div></div>`;
}

function doSendMsg(){

  S.msgInputs[S.selContact]='';render();

function triggerFileInput(id){closeAttach();setTimeout(()=>document.getElementById(id)?.click(),100);}
function handleChatFile(ev,type){
  const file=ev.target.files?.[0];if(!file||!S.selContact)return;

function sendCollabInvite(classId,asgnId){

  S.collabWorkspace[invId]={mySection:'',theirSection:'AI is preparing a collaborative workspace for this assignment...\n\nBoth of you can work on your own sections and save them to the shared document.'};
  const thread=S.threads[S.selContact]||(S.threads[S.selContact]=[]);
  thread.push({id:Date.now(),role:'me',type:'collab-invite',inviteId:invId,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});

}

function saveWorkspace(invId){
  const mySection=document.getElementById('ws-my')?.value||'';
  S.collabWorkspace[invId].mySection=mySection;
  const inv=S.collabInvites[invId]||{};
  const cls=S.classes.find(c=>c.id===inv.classId);
  const asgn=cls?.assignments.find(a=>a.id===inv.asgnId);
  if(cls&&asgn){
    const contact=S.contacts.find(c=>c.id===S.selContact);
    const docName=`Collab: ${asgn.title}`;
    const combined=`SHARED WORKSPACE\nWith: ${contact?.name||'Collaborator'}\n\n--- MY SECTION ---\n${mySection}\n\n--- ${contact?.name?.toUpperCase()||'THEIR'} SECTION ---\n${S.collabWorkspace[invId].theirSection||''}`;
    const existing=cls.docs.find(d=>d.name===docName);
    if(existing){existing.content=combined;}
    else{cls.docs.push({id:Date.now(),name:docName,content:combined,qa:[]});}
  }
  cmod();
  const notice=document.createElement('div');notice.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;z-index:999;font-family:system-ui';notice.textContent='Saved to class!';document.body.appendChild(notice);setTimeout(()=>notice.remove(),2000);
}

function exportWorkspacePDF(invId){
  const ws=S.collabWorkspace[invId]||{};const inv=S.collabInvites[invId]||{};
  const cls=S.classes.find(c=>c.id===inv.classId);const asgn=cls?.assignments.find(a=>a.id===inv.asgnId);
  const content=`My Section:\n${ws.mySection||''}\n\nCollaborator Section:\n${ws.theirSection||''}`;
  exportPDF(asgn?asgn.title+' — Shared Workspace':'Shared Workspace',content);
}

function rSched(){
  const GH=380,TS=7,TE=21,TD=TE-TS;const WDAYS=['Monday','Tuesday','Wednesday','Thursday','Friday'];
  const tL=Array.from({length:TD+1},(_,i)=>`<div style="position:absolute;top:${i/TD*GH}px;font-size:8px;color:var(--tt);right:4px;transform:translateY(-50%);white-space:nowrap">${TS+i}:00</div>`).join('');
  const gL=Array.from({length:TD-1},(_,i)=>`<div style="position:absolute;top:${(i+1)/TD*GH}px;left:0;right:0;border-top:.5px solid var(--bdt)"></div>`).join('');
  function slots(dn){return S.classes.flatMap(c=>c.schedule.filter(s=>s.day===dn).map(s=>({...s,cls:c}))).map(s=>{const sm=(parseInt(s.start)*60+parseInt(s.start.split(':')[1]))-(TS*60),em=(parseInt(s.end)*60+parseInt(s.end.split(':')[1]))-(TS*60);const top=sm/(TD*60)*GH,h=Math.max((em-sm)/(TD*60)*GH,20);return`<div style="position:absolute;top:${top}px;left:2px;right:2px;height:${h}px;background:${s.cls.color}25;border-left:3px solid ${s.cls.color};border-radius:0 4px 4px 0;padding:3px 5px;overflow:hidden"><div style="font-size:8.5px;font-weight:600;color:${s.cls.color};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e(s.cls.name)}</div><div style="font-size:7.5px;color:var(--ts)">${s.start}–${s.end}</div><div onclick="delSlot(${s.id})" style="position:absolute;top:2px;right:3px;color:var(--tt);cursor:pointer;font-size:11px">×</div></div>`;}).join('');}
  return`<div class="sh2"><span style="font-size:12px;font-weight:500">Weekly Timetable</span><button class="btn bta btsm" onclick="omod('add-slot')">+ Add time</button></div>
  <div style="display:grid;grid-template-columns:38px repeat(5,minmax(0,1fr));gap:3px"><div></div>${WDAYS.map(d=>`<div style="font-size:8.5px;text-align:center;color:var(--tt);padding:4px 0;text-transform:uppercase;font-weight:500;background:var(--bs);border-radius:5px;margin-bottom:2px">${d}</div>`).join('')}<div style="position:relative;height:${GH}px">${tL}</div>${[1,2,3,4,5].map(dn=>`<div style="position:relative;height:${GH}px;background:var(--bs);border-radius:7px;border:.5px solid var(--bdt)">${gL}${slots(dn)}</div>`).join('')}</div>`;
}

function rCal(){
  const{calY:yr,calM:mo}=S,dim=new Date(yr,mo+1,0).getDate(),fd=new Date(yr,mo,1).getDay();
  const td=new Date(),tds=`${td.getFullYear()}-${String(td.getMonth()+1).padStart(2,'0')}-${String(td.getDate()).padStart(2,'0')}`;
  const allA=S.classes.flatMap(c=>c.assignments.map(a=>({...a,cls:c})));
  const cells=Array.from({length:fd},()=>'<div class="calc em"></div>').join('')+Array.from({length:dim},(_,i)=>{const d=i+1,ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,isT=ds===tds;const da=allA.filter(a=>a.dueDate===ds),se=S.schoolEvents.filter(x=>x.date===ds);return`<div class="calc ${isT?'tod':''}"><div class="caldn ${isT?'tn':''}">${d}</div>${se.slice(0,1).map(x=>`<div class="calev" style="background:${x.color}22;color:${x.color}">${e(x.title)}</div>`).join('')}${da.slice(0,2).map(a=>`<div class="calev" style="background:${a.cls.color};color:#fff">${e(a.title)}</div>`).join('')}</div>`;}).join('');
  const up=allA.filter(a=>!a.done&&a.dueDate>=tds).sort((a,b)=>a.dueDate.localeCompare(b.dueDate)).slice(0,8);
  return`<div class="calw"><div><div class="calh"><div class="calm">${MONTHS[mo]} ${yr}</div><div style="display:flex;gap:4px"><button class="calnb" onclick="calNav(-1)">‹</button><button class="calnb" onclick="calNav(1)">›</button></div></div><div class="calg">${DSHT.map(d=>`<div class="caldl">${d}</div>`).join('')}${cells}</div></div>
  <div><div class="cd"><div class="clbl">Upcoming tasks</div>${up.map(a=>`<div style="padding:5px 0;border-bottom:.5px solid var(--bdt)"><div style="font-size:11px;font-weight:500">${e(a.title)}</div><div style="display:flex;align-items:center;gap:5px;margin-top:1px"><div style="font-size:9.5px;font-weight:500;color:${a.cls.color}">${e(a.cls.name)}</div><span class="wt-badge ${WT[a.weight||'prepare'].cls}">${WT[a.weight||'prepare'].label}</span></div><div style="font-size:9.5px;color:var(--tt)">Due ${a.dueDate}</div></div>`).join('')}</div>
  <div class="cd"><div class="sh2"><span class="clbl" style="margin:0">School events</span><button class="btn btsm" onclick="omod('add-event')" style="font-size:10px;padding:2px 6px">+ Add</button></div>${S.schoolEvents.sort((a,b)=>a.date.localeCompare(b.date)).map(x=>`<div style="display:flex;align-items:center;gap:7px;padding:5px 9px;background:var(--bp);border:.5px solid var(--bdt);border-radius:7px;margin-bottom:4px"><div class="sdot" style="background:${x.color}"></div><div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:500">${e(x.title)}</div><div style="font-size:9.5px;color:var(--ts)">${x.date}</div></div><div onclick="delEv(${x.id})" style="cursor:pointer;color:var(--tt);font-size:12px">×</div></div>`).join('')}</div></div></div>`;
}

function swatches(si=0){selCol=ACOLS[si];return`<div class="csws">${ACOLS.map((c,i)=>`<div style="background:${c}" class="${i===si?'sel':''}" onclick="pickCol('${c}',this)"></div>`).join('')}</div>`;}
function pickCol(c,el){selCol=c;el.closest('.csws').querySelectorAll('div').forEach(d=>d.classList.remove('sel'));el.classList.add('sel');}
function cmod(ev){if(!ev||ev.target===document.getElementById('mcon'))document.getElementById('mcon').style.display='none';}

  else if(type==='add-asgn'){inn.innerHTML=`<div class="mtt">Add assignment${cls?' — '+e(cls.name):''}</div><div class="fg"><div class="flbl">Title</div><input id="m-at" placeholder="e.g. Chapter Quiz"/></div><div class="fg"><div class="flbl">Grade weight</div><div style="display:flex;gap:6px;margin-top:4px">${['perform','rehearse','prepare'].map(w=>`<div id="wt-${w}" onclick="selWeight('${w}')" style="flex:1;padding:7px 6px;border-radius:8px;border:1.5px solid ${w===S._selWeight?WT[w].col:'var(--bdt)'};background:${w===S._selWeight?WT[w].col+'18':'transparent'};cursor:pointer;text-align:center"><div class="wt-badge ${WT[w].cls}" style="justify-content:center;width:100%">${WT[w].label}</div><div style="font-size:9px;color:var(--ts);margin-top:3px">${w==='perform'?'Exam/Test':w==='rehearse'?'Quiz/Practice':'HW/Reading'}</div></div>`).join('')}</div></div><div class="fg"><div class="flbl">Due date</div><input id="m-ad" type="date"/></div><div class="mac"><button class="btn" onclick="cmod()">Cancel</button><button class="btn bta" onclick="doAddAsgn()">Add</button></div>`;S._selWeight='perform';setTimeout(()=>document.getElementById('m-at')?.focus(),50);}
  else if(type==='add-slot'){inn.innerHTML=`<div class="mtt">Add class time</div><div class="fg"><div class="flbl">Class</div><select id="m-sc">${S.classes.map(c=>`<option value="${c.id}">${e(c.name)}</option>`).join('')}</select></div><div class="fg"><div class="flbl">Day</div><select id="m-sd"><option value="1">Monday</option><option value="2">Tuesday</option><option value="3">Wednesday</option><option value="4">Thursday</option><option value="5">Friday</option></select></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:9px"><div class="fg"><div class="flbl">Start</div><input id="m-sst" type="time" value="09:00"/></div><div class="fg"><div class="flbl">End</div><input id="m-set" type="time" value="10:30"/></div></div><div class="fg"><div class="flbl">Room</div><input id="m-sr" placeholder="e.g. Room 214"/></div><div class="mac"><button class="btn" onclick="cmod()">Cancel</button><button class="btn bta" onclick="doAddSlot()">Add</button></div>`;}

function selWeight(w){S._selWeight=w;['perform','rehearse','prepare'].forEach(x=>{const el=document.getElementById('wt-'+x);if(el){el.style.border=`1.5px solid ${x===w?WT[x].col:'var(--bdt)'}`;el.style.background=x===w?WT[x].col+'18':'transparent';}});}

function doEditPktQ(){const q=document.getElementById('m-epq')?.value?.trim();if(!q)return;const cls=S.classes.find(c=>c.id===S.selClassId),pkt=cls?.packets.find(p=>p.id===S.selPktId);if(pkt)pkt.questions=q;cmod();render();}
function doEditPktRef(){const t=document.getElementById('m-epr')?.value?.trim()||'';const cls=S.classes.find(c=>c.id===S.selClassId),pkt=cls?.packets.find(p=>p.id===S.selPktId);if(pkt)pkt.textbook=t;cmod();render();}
function doAddAsgn(){const t=document.getElementById('m-at')?.value?.trim(),d=document.getElementById('m-ad')?.value;if(!t||!d)return;const cls=S.classes.find(x=>x.id===S.selClassId);if(cls)cls.assignments.push({id:Date.now(),title:t,dueDate:d,done:false,weight:S._selWeight||'prepare'});cmod();render();}
function doAddSlot(){const cid=parseInt(document.getElementById('m-sc')?.value),day=parseInt(document.getElementById('m-sd')?.value),st=document.getElementById('m-sst')?.value,et=document.getElementById('m-set')?.value,rm=document.getElementById('m-sr')?.value?.trim()||'';if(!cid||!day||!st||!et)return;const cls=S.classes.find(x=>x.id===cid);if(cls)cls.schedule.push({id:Date.now(),day,start:st,end:et,room:rm});cmod();render();}
function doAddEvent(){const n=document.getElementById('m-en')?.value?.trim(),d=document.getElementById('m-ed')?.value;if(!n||!d)return;S.schoolEvents.push({id:Date.now(),title:n,date:d,color:selCol});cmod();render();}
function doAddExam(){const n=document.getElementById('m-xn')?.value?.trim(),d=document.getElementById('m-xd')?.value;if(!n||!d)return;S.examDates.push({id:Date.now(),name:n,date:d,color:selCol});cmod();render();}
function doAddContact(){const n=document.getElementById('m-cn')?.value?.trim();if(!n)return;const id='u'+Date.now();const initials=n.split(' ').map(x=>x[0]?.toUpperCase()||'').join('').slice(0,2);S.contacts.push({id,name:n,initials,color:selCol,online:true});S.threads[id]=[];cmod();S.selContact=id;render();}

async function hdlFile(ev,taId,nameId,fzId){
  const file=ev.target.files?.[0];if(!file)return;
  const fz=document.getElementById(fzId);if(fz)fz.innerHTML='<div class="ld"><span></span><span></span><span></span></div> Reading...';
  let text='';
  try{const nm=file.name.toLowerCase();
    if(nm.endsWith('.txt'))text=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsText(file);});
    else if(nm.endsWith('.pdf')&&typeof pdfjsLib!=='undefined'){const ab=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:new Uint8Array(ab)}).promise;const pgs=[];for(let i=1;i<=Math.min(pdf.numPages,30);i++){const pg=await pdf.getPage(i);const tc=await pg.getTextContent();pgs.push(tc.items.map(x=>x.str).join(' '));}text=pgs.join('\n\n');}
    else if(nm.endsWith('.docx')&&typeof mammoth!=='undefined'){const ab=await file.arrayBuffer();const res=await mammoth.extractRawText({arrayBuffer:ab});text=res.value;}
    else text='Could not read. Please paste manually.';
  }catch(err){text='Error: '+err.message;}
  if(nameId){const n=document.getElementById(nameId);if(n&&!n.value)n.value=file.name.replace(/\.[^.]+$/,'');}
  const ta=document.getElementById(taId);if(ta)ta.value=text;
  if(fz)fz.textContent='Loaded: '+file.name+' ('+text.length+' chars)';
}

async function askClaude(msgs,sys=''){
  try{const b={model:'claude-sonnet-4-20250514',max_tokens:1000,messages:msgs};if(sys)b.system=sys;const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});const d=await r.json();return d.content?.[0]?.text||'No response.';}catch(err){return'Error: '+err.message;}
}

async function doQA(){
  const inp=document.getElementById('qai'),q=inp?.value?.trim();if(!q||S.qaLoading)return;
  const cls=S.classes.find(c=>c.id===S.selClassId),doc=cls?.docs.find(d=>d.id===S.selDocId);if(!doc)return;
  inp.value='';S.qaLoading=true;render();
  const a=await askClaude([{role:'user',content:`Document:\n\n${doc.content}\n\nQuestion: ${q}`}],'You are a helpful study assistant. Answer accurately based on the document.');
  doc.qa.push({q,a});S.qaLoading=false;render();
}

async function doPkt(){
  const inp=document.getElementById('pkt-in'),q=inp?.value?.trim();if(!q||S.pktLoading)return;
  const cls=S.classes.find(c=>c.id===S.selClassId),pkt=cls?.packets.find(p=>p.id===S.selPktId);if(!pkt)return;
  inp.value='';pkt.messages.push({role:'user',content:q});S.pktLoading=true;render();
  const sys=`You are a study assistant helping complete a packet. QUESTION PACKET:\n${pkt.questions}\n\n${pkt.textbook?'TEXTBOOK:\n'+pkt.textbook:'(No textbook)'}`;
  const a=await askClaude(pkt.messages.map(m=>({role:m.role==='user'?'user':'assistant',content:m.content})),sys);
  pkt.messages.push({role:'ai',content:a});S.pktLoading=false;render();
  setTimeout(()=>{const el=document.getElementById('pkt-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
}

async function doFlash(){
  const cls=S.classes.find(c=>c.id===S.selClassId);if(!cls||S.fcLoading)return;
  const srcEl=document.getElementById('fc-src');if(!srcEl)return;
  const val=srcEl.value;let content='';
  if(val.startsWith('doc-')){const d=cls.docs.find(x=>x.id===parseInt(val.replace('doc-','')));content=d?.content||'';}
  else if(val.startsWith('pkt-')){const p=cls.packets.find(x=>x.id===parseInt(val.replace('pkt-','')));content=p?(p.questions+(p.textbook?'\n\n'+p.textbook:'')):'';}
  if(!content)return;S.fcLoading=true;render();
  const resp=await askClaude([{role:'user',content:`Generate 8 flashcards. Return ONLY JSON array:\n[{"q":"...","a":"..."},...]\n\n${content.slice(0,3000)}`}],'Return ONLY a valid JSON array. No markdown, no extra text.');
  try{const cards=JSON.parse(resp.replace(/```json|```/g,'').trim());cards.forEach(c=>cls.flashcards.push({id:Date.now()+Math.random(),q:c.q,a:c.a}));}catch(err){}
  S.fcLoading=false;flipSt={};render();
}

async function doChat(){
  const inp=document.getElementById('chat-in'),q=inp?.value?.trim();if(!q||S.chatLoading)return;
  inp.value='';S.chatMsgs.push({role:'user',content:q});S.chatLoading=true;render();
  const a=await askClaude(S.chatMsgs.map(m=>({role:m.role==='user'?'user':'assistant',content:m.content})),'You are a helpful, knowledgeable assistant. Answer clearly and helpfully.');
  S.chatMsgs.push({role:'ai',content:a});S.chatLoading=false;render();
}

async function doWrite(){
  const ta=document.getElementById('write-in'),inp=ta?.value?.trim();if(!inp||S.writeLoading)return;
  S.writeInput=inp;S.writeLoading=true;S.writeOut=null;render();
  const resp=await askClaude([{role:'user',content:inp}],`You are an expert writing coach reviewing a ${S.writeTone} draft. Return ONLY JSON:\n{"sections":[{"label":"Overall Impression","body":"..."},{"label":"Strengths","body":"..."},{"label":"Areas to Improve","body":"..."},{"label":"Specific Suggestions","body":"..."},{"label":"Revised Opening","body":"..."}]}`);
  try{S.writeOut=JSON.parse(resp.replace(/```json|```/g,'').trim());}catch{S.writeOut={sections:[{label:'Feedback',body:resp}]};}
  S.writeLoading=false;render();
}

async function doSum(){
  const ta=document.getElementById('sum-in'),inp=ta?.value?.trim();if(!inp||S.sumLoading)return;
  S.sumInput=inp;S.sumLoading=true;S.sumOut='';render();
  const out=await askClaude([{role:'user',content:inp}],'Summarize clearly for a student:\n\nOverview:\n(2-3 sentences)\n\nMain Points:\n• ...\n\nKey Details:\n• ...\n\nTakeaways:\n• ...');
  S.sumOut=out;S.sumLoading=false;render();
}
